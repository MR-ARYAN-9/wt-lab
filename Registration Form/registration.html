<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form - Exercise 2</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <h2>Create Your Account</h2>
                <p>Fill in the details below to register</p>
            </div>

            <form id="registrationForm" method="POST" novalidate>
                <!-- First Name Field -->
                <div class="form-group">
                    <label for="firstName">First Name <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="firstName" 
                        name="firstName" 
                        placeholder="Enter your first name"
                        required
                    >
                    <span class="error-message" id="firstNameError"></span>
                    <span class="success-message" id="firstNameSuccess"></span>
                </div>

                <!-- Last Name Field -->
                <div class="form-group">
                    <label for="lastName">Last Name <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="lastName" 
                        name="lastName" 
                        placeholder="Enter your last name"
                        required
                    >
                    <span class="error-message" id="lastNameError"></span>
                    <span class="success-message" id="lastNameSuccess"></span>
                </div>

                <!-- Email Field -->
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email address"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                    <span class="success-message" id="emailSuccess"></span>
                </div>

                <!-- Phone Number Field -->
                <div class="form-group">
                    <label for="phone">Phone Number <span class="required">*</span></label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="Enter your phone number (10 digits)"
                        required
                    >
                    <span class="error-message" id="phoneError"></span>
                    <span class="success-message" id="phoneSuccess"></span>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Create a strong password"
                        required
                    >
                    <span class="error-message" id="passwordError"></span>
                    <div class="password-strength">
                        <div class="strength-meter">
                            <div class="strength-meter-fill" id="strengthMeter"></div>
                        </div>
                        <span class="strength-text" id="strengthText">Password strength: —</span>
                    </div>
                </div>

                <!-- Confirm Password Field -->
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Re-enter your password"
                        required
                    >
                    <span class="error-message" id="confirmPasswordError"></span>
                    <span class="success-message" id="confirmPasswordSuccess"></span>
                </div>

                <!-- Terms and Conditions -->
                <div class="form-group checkbox">
                    <input 
                        type="checkbox" 
                        id="terms" 
                        name="terms" 
                        required
                    >
                    <label for="terms">I agree to the Terms and Conditions <span class="required">*</span></label>
                    <span class="error-message" id="termsError"></span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-submit">Create Account</button>
                
                <!-- Login Link -->
                <p class="login-link">
                    Already have an account? <a href="login.html">Login here</a>
                </p>
            </form>

            <!-- Success Message -->
            <div id="successMessage" class="alert alert-success" style="display: none;">
                <strong>Success!</strong> Your account has been created successfully. Redirecting to E-Commerce...
            </div>
        </div>
    </div>

    <script src="js/validation.js"></script>
    <script src="js/registration.js"></script>
</body>
</html>
