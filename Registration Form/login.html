<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form - Exercise 2</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="form-container login-container">
            <div class="form-header">
                <h2>Welcome Back</h2>
                <p>Login to your account</p>
            </div>

            <form id="loginForm" method="POST" novalidate>
                <!-- Email Field -->
                <div class="form-group">
                    <label for="loginEmail">Email Address <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        name="email" 
                        placeholder="Enter your email address"
                        required
                    >
                    <span class="error-message" id="loginEmailError"></span>
                    <span class="success-message" id="loginEmailSuccess"></span>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="loginPassword">Password <span class="required">*</span></label>
                    <input 
                        type="password" 
                        id="loginPassword" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                    >
                    <span class="error-message" id="loginPasswordError"></span>
                </div>

                <!-- Remember Me -->
                <div class="form-group checkbox">
                    <input 
                        type="checkbox" 
                        id="rememberMe" 
                        name="rememberMe"
                    >
                    <label for="rememberMe">Remember me</label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-submit">Login</button>
                
                <!-- Registration Link -->
                <p class="login-link">
                    Don't have an account? <a href="registration.html">Create one here</a>
                </p>

                <!-- Home Link -->
                <p class="login-link">
                    <a href="index.html">← Back to Home</a>
                </p>
            </form>

            <!-- Error Message -->
            <div id="errorMessage" class="alert alert-error" style="display: none;">
                <strong>Error!</strong> <span id="errorText"></span>
            </div>

            <!-- Success Message -->
            <div id="successMessage" class="alert alert-success" style="display: none;">
                <strong>Success!</strong> Login successful. Redirecting...
            </div>

            <!-- Demo Accounts Info -->
            <div class="info-box">
                <h4>Demo Accounts (for testing)</h4>
                <p><strong>Email:</strong> aryan@gmail.com</p>
                <p><strong>Password:</strong> test123</p>
                <hr style="margin: 10px 0; border: none; border-top: 1px solid #ddd;">
                <p><strong>Email:</strong> user@example.com</p>
                <p><strong>Password:</strong> Password123!</p>
            </div>
        </div>
    </div>

    <script src="js/validation.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
