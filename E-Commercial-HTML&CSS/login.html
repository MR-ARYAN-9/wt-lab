<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudentVerse Market</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-box">
            <!-- Logo -->
            <div class="auth-header">
                <span class="logo-emoji">🎓</span>
                <h1 class="logo-text">StudentVerse <span class="logo-highlight">Market</span></h1>
            </div>

            <!-- Login Form -->
            <div class="form-container">
                <h2 class="form-title">Welcome Back!</h2>
                <p class="form-subtitle">Sign in to your account to continue shopping</p>

                <form id="loginForm" class="auth-form" novalidate>
                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="loginEmail" class="form-label">📧 Email Address</label>
                        <input 
                            type="email" 
                            id="loginEmail" 
                            class="form-input" 
                            placeholder="Enter your email"
                            required
                        >
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="loginPassword" class="form-label">🔐 Password</label>
                        <input 
                            type="password" 
                            id="loginPassword" 
                            class="form-input" 
                            placeholder="Enter your password"
                            required
                        >
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="form-footer">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="submit-btn">🔓 Login to Account</button>

                    <!-- Error/Success Message -->
                    <div class="message-box" id="loginMessage"></div>
                </form>

                <!-- Sign Up Link -->
                <div class="auth-footer">
                    <p>Don't have an account? <a href="registration.html" class="auth-link">Create one here</a></p>
                </div>
            </div>

            <!-- Info Section -->
            <div class="info-section">
                <div class="info-item">
                    <span class="info-icon">🔒</span>
                    <p>Your data is secure and encrypted</p>
                </div>
                <div class="info-item">
                    <span class="info-icon">⚡</span>
                    <p>Quick and easy login process</p>
                </div>
                <div class="info-item">
                    <span class="info-icon">🎁</span>
                    <p>Access exclusive student deals</p>
                </div>
            </div>
        </div>

        <!-- Decorative Elements -->
        <div class="decoration decoration-1"></div>
        <div class="decoration decoration-2"></div>
    </div>

    <script src="../Form Handling and Form validation/form-handler.js"></script>
</body>
</html>
