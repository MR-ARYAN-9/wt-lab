<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details Management</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f3f6fb;
      color: #1f2937;
    }
    .page-shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    .hero {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(30px, 3vw, 42px);
    }
    .hero p {
      margin: 6px 0 0;
      color: #475569;
      max-width: 700px;
      line-height: 1.7;
    }
    .panel {
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 18px 60px rgba(15, 23, 42, 0.08);
      padding: 26px;
      margin-bottom: 24px;
    }
    .panel h2 {
      margin: 0 0 18px;
      font-size: 22px;
    }
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      background: #2563eb;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    .button.gray {
      background: #e2e8f0;
      color: #111827;
    }
    .button.red {
      background: #dc2626;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 740px;
    }
    th, td {
      text-align: left;
      padding: 14px 16px;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: top;
    }
    th {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
    }
    tr:hover {
      background: #f8fafc;
    }
    .small-text {
      color: #64748b;
      font-size: 13px;
      line-height: 1.6;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      background: #e2e8f0;
      color: #0f172a;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #334155;
      font-weight: 700;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      color: #0f172a;
      background: #f8fafc;
      box-sizing: border-box;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
      align-items: center;
    }
    .status {
      margin-top: 16px;
      color: #334155;
      font-size: 14px;
      line-height: 1.7;
    }
    .status.success {
      color: #166534;
    }
    .status.error {
      color: #b91c1c;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 760px) {
      .hero {
        flex-direction: column;
        align-items: stretch;
      }
      table {
        min-width: 100%;
      }
    }
  </style>
  <script>
    if (window.location.protocol === 'file:') {
      document.documentElement.innerHTML = `
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Product Details Management</title>
          <style>
            body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f8fafc; color: #111827; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
            .warning { max-width: 720px; padding: 28px; border-radius: 24px; background: #ffffff; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08); }
            .warning h1 { margin: 0 0 16px; font-size: 28px; }
            .warning p { margin: 12px 0; line-height: 1.7; }
            .warning code { background: #f1f5f9; padding: 4px 8px; border-radius: 8px; }
          </style>
        </head>
        <body>
          <div class="warning">
            <h1>Do not open this page with file://</h1>
            <p>This app requires PHP to run on a web server. Do not open <code>index.html</code> directly from the file system.</p>
            <p>Start the server and use one of these URLs:</p>
            <ul>
              <li><code>http://127.0.0.1:8000/index.html</code></li>
              <li><code>http://127.0.0.1/Product%20details%20management/index.html</code> if using XAMPP</li>
            </ul>
            <p>If you are using the built-in helper, run <code>.\start-server.ps1</code> from the project folder first.</p>
          </div>
        </body>
      `;
    }
  </script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <div class="hero">
      <div>
        <h1>Product Details Management</h1>
        <p>View, add, update, and delete product records using the PHP/MySQL API. Changes are persisted in the database and reflected instantly in the table.</p>
      </div>
      <div class="button-group">
        <button class="button" id="refreshButton">Refresh Products</button>
        <button class="button gray" id="newProductButton">Create New Product</button>
      </div>
    </div>

    <section class="panel">
      <h2>Products</h2>
      <div id="productsContainer">
        <p class="small-text">Loading products from the API…</p>
      </div>
    </section>

    <section class="panel">
      <h2 id="formTitle">Add new product</h2>
      <form id="productForm">
        <input type="hidden" id="productId" />
        <div class="field-grid">
          <div>
            <label for="category">Category</label>
            <input id="category" name="category" required placeholder="AI Tools, Coding, Study, Security" />
          </div>
          <div>
            <label for="name">Product Name</label>
            <input id="name" name="name" required placeholder="Enter product name" />
          </div>
          <div>
            <label for="price">Price (₹)</label>
            <input id="price" name="price" type="number" step="0.01" min="0" required placeholder="499" />
          </div>
          <div>
            <label for="mrp">MRP (optional)</label>
            <input id="mrp" name="mrp" type="number" step="0.01" min="0" placeholder="999" />
          </div>
          <div>
            <label for="badge">Badge (optional)</label>
            <input id="badge" name="badge" placeholder="NEW, HOT, PRO" />
          </div>
          <div>
            <label for="icon">Icon (emoji)</label>
            <input id="icon" name="icon" placeholder="📦" />
          </div>
        </div>
        <div style="margin-top:16px;">
          <label for="description">Description</label>
          <textarea id="description" name="description" required placeholder="Describe the product"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="button" id="submitButton">Save Product</button>
          <button type="button" class="button gray" id="cancelEditButton">Cancel</button>
        </div>
        <div id="statusMessage" class="status hidden"></div>
      </form>
    </section>
  </div>
</body>
</html>
